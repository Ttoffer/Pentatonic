<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faberge Egg</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at 50% 34%, #1d2f6a 0%, #060918 58%, #010106 100%);
      }

      .stage {
        position: relative;
        width: min(84vw, 520px);
        height: min(84vh, 620px);
        display: grid;
        place-items: center;
        perspective: 950px;
      }

      .rotator {
        position: relative;
        width: 280px;
        height: 440px;
        transform-style: preserve-3d;
        animation: spin 13s linear infinite;
      }

      .pedestal {
        position: absolute;
        left: 50%;
        bottom: 8px;
        width: 245px;
        height: 70px;
        transform: translateX(-50%) rotateX(70deg);
        border-radius: 50%;
        background: radial-gradient(circle at 40% 30%, #8f95ae 0%, #4a4f66 45%, #282b3b 100%);
        box-shadow:
          inset 0 10px 18px rgba(255, 255, 255, 0.15),
          inset 0 -18px 26px rgba(0, 0, 0, 0.42),
          0 22px 40px rgba(0, 0, 0, 0.42);
      }

      .egg-wrap {
        position: absolute;
        left: 50%;
        top: 24px;
        width: 220px;
        height: 330px;
        transform: translateX(-50%) rotateX(8deg);
        transform-style: preserve-3d;
      }

      .shell {
        position: absolute;
        inset: 0;
        border-radius: 50% 50% 47% 47% / 61% 61% 39% 39%;
        background:
          radial-gradient(circle at 25% 20%, rgba(255, 252, 236, 0.95) 0%, rgba(255, 252, 236, 0.1) 20%, transparent 42%),
          conic-gradient(
            from 160deg at 50% 45%,
            #f6e6b8 0deg,
            #bb8f44 64deg,
            #f7e3b0 124deg,
            #96672d 190deg,
            #f5db9b 246deg,
            #c69548 305deg,
            #f5e1ad 360deg
          );
        border: 1px solid rgba(255, 225, 164, 0.7);
        box-shadow:
          inset 0 10px 20px rgba(255, 255, 255, 0.3),
          inset 0 -26px 36px rgba(68, 30, 2, 0.5),
          0 20px 55px rgba(0, 0, 0, 0.45);
        animation: shell-fade 2.6s ease-in-out 3s forwards;
      }

      .shell::before,
      .shell::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
      }

      .shell::before {
        background:
          repeating-linear-gradient(
            17deg,
            rgba(255, 232, 180, 0.33) 0px,
            rgba(255, 232, 180, 0.33) 2px,
            rgba(0, 0, 0, 0) 2px,
            rgba(0, 0, 0, 0) 14px
          ),
          repeating-linear-gradient(
            -17deg,
            rgba(192, 132, 54, 0.26) 0px,
            rgba(192, 132, 54, 0.26) 1px,
            rgba(0, 0, 0, 0) 1px,
            rgba(0, 0, 0, 0) 11px
          );
        mix-blend-mode: overlay;
        opacity: 0.75;
      }

      .shell::after {
        box-shadow:
          inset 0 0 0 6px rgba(230, 188, 95, 0.66),
          inset 0 0 0 14px rgba(91, 51, 12, 0.25);
      }

      .ring {
        position: absolute;
        left: 50%;
        width: 176px;
        height: 26px;
        border-radius: 50%;
        transform: translateX(-50%) rotateX(80deg);
        background: linear-gradient(180deg, #ffd980 0%, #a5722d 100%);
        box-shadow:
          inset 0 4px 6px rgba(255, 247, 221, 0.4),
          inset 0 -5px 10px rgba(72, 39, 7, 0.55),
          0 0 12px rgba(255, 184, 66, 0.28);
      }

      .ring.top {
        top: 104px;
      }

      .ring.bottom {
        top: 225px;
      }

      .sapphire {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 96px;
        height: 110px;
        transform: translate(-50%, -52%) rotate(45deg) scale(0.84);
        clip-path: polygon(50% 0%, 88% 24%, 100% 56%, 50% 100%, 0% 56%, 12% 24%);
        background:
          radial-gradient(circle at 35% 24%, rgba(185, 227, 255, 0.95) 0%, rgba(185, 227, 255, 0.15) 30%, transparent 42%),
          linear-gradient(165deg, #9ee0ff 0%, #3f7eff 34%, #1135bc 72%, #0a1770 100%);
        box-shadow:
          0 0 18px rgba(93, 152, 255, 0.9),
          0 0 55px rgba(38, 92, 255, 0.7),
          inset 0 0 20px rgba(216, 243, 255, 0.45);
        animation:
          pulse 2.4s ease-in-out infinite,
          sapphire-reveal 2.6s ease-in-out 3s forwards;
      }

      .sapphire::before {
        content: "";
        position: absolute;
        inset: 8%;
        clip-path: inherit;
        background: linear-gradient(150deg, rgba(236, 249, 255, 0.65), rgba(0, 0, 0, 0));
      }

      .caption {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        font-size: 0.9rem;
        letter-spacing: 0.02em;
        color: #d2dcff;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 0.6rem 0.8rem;
        border-radius: 0.5rem;
      }

      @keyframes spin {
        from {
          transform: rotateY(0deg);
        }
        to {
          transform: rotateY(360deg);
        }
      }

      @keyframes shell-fade {
        0% {
          opacity: 1;
          filter: saturate(1);
        }
        100% {
          opacity: 0.2;
          filter: saturate(0.9);
        }
      }

      @keyframes sapphire-reveal {
        0% {
          opacity: 0.45;
          filter: brightness(0.8);
        }
        100% {
          opacity: 1;
          filter: brightness(1.25);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translate(-50%, -52%) rotate(45deg) scale(0.84);
        }
        50% {
          transform: translate(-50%, -52%) rotate(45deg) scale(0.92);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .rotator,
        .shell,
        .sapphire {
          animation-duration: 0.001ms;
          animation-iteration-count: 1;
          animation-fill-mode: forwards;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="Animated Faberge egg with sapphire center">
      <div class="rotator">
        <div class="pedestal"></div>
        <div class="egg-wrap">
          <div class="sapphire"></div>
          <div class="shell"></div>
          <div class="ring top"></div>
          <div class="ring bottom"></div>
        </div>
      </div>
    </main>
    <div class="caption">Faberge Egg — shell fades after 3 seconds to reveal sapphire</div>
  </body>
</html>
